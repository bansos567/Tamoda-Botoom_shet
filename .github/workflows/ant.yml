name: Build Tamoda Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Compile Extension pakai Ant
      run: ant extensions

    - name: Upload Hasil AIX
      uses: actions/upload-artifact@v4
      with:
        name: Tamoda-Koneksi-Extension
        path: out/*.aix
